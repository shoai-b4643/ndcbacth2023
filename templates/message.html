<!DOCTYPE html>
<html>

<head>

<title>Message</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

.container{
width:400px;
margin:auto;
margin-top:120px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
text-align:center;
}

h2{
color:#2c3e50;
}

button{
margin-top:20px;
padding:10px 20px;
background:#3498db;
color:white;

border-radius:5px;
font-size:16px;

}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<div class="container">

<h2>{{ message }}</h2>

<a href="/">
<button>Back</button>
</a>

</div>

</body>

</html>
